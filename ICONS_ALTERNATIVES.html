<!-- NOTAS DE IMPLEMENTACIÓN -->
<!--
Para usar estos iconos:

1. Copia el SVG completo
2. Reemplaza el SVG actual en index.html en la sección correspondiente
3. Ajusta el viewBox si es necesario
4. Personaliza los colores con currentColor

Ejemplo:
<div class="platform-icon radio-icon">
  [AQUÍ VA EL NUEVO SVG]
</div>

Las clases CSS ya tienen estilos para:
- radio-icon → fondo rojo con borde rojo
- tv-icon → fondo naranja con borde naranja

Puedes añadir animaciones con CSS:
.platform-icon svg {
  animation: spin 3s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
-->
